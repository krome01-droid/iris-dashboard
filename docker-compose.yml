# ============================================
# IRIS Dashboard — Docker Compose (Hostinger VPS)
# Image pré-buildée sur GHCR via GitHub Actions
# Stack cible : Webflow (PAS WordPress)
# ============================================

services:
  iris-dashboard:
    image: ghcr.io/krome01-droid/iris-dashboard:latest
    pull_policy: always
    container_name: iris-dashboard
    restart: unless-stopped
    ports:
      - "3848:3848"
    environment:
      # Runtime
      - NODE_ENV=production
      - PORT=3848
      - HOSTNAME=0.0.0.0

      # NextAuth
      - NEXTAUTH_URL=${NEXTAUTH_URL}
      - NEXTAUTH_SECRET=${NEXTAUTH_SECRET}

      # Admin local (fallback login)
      - ADMIN_USERNAME=${ADMIN_USERNAME}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD}
      - IRIS_PREVIEW_EMAIL=${IRIS_PREVIEW_EMAIL}

      # Anthropic Claude
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - ANTHROPIC_MODEL_FAST=${ANTHROPIC_MODEL_FAST:-claude-sonnet-4-6}
      - ANTHROPIC_MODEL_DEEP=${ANTHROPIC_MODEL_DEEP:-claude-opus-4-7}

      # Webflow API v2 (CMS, Pages, Assets) — site cible Iris
      - WF_API_KEY=${WF_API_KEY}
      - WF_SITE_ID=${WF_SITE_ID}
      - WF_COLLECTION_ID_PERMIS_BLOGS=${WF_COLLECTION_ID_PERMIS_BLOGS}
      - WF_COLLECTION_ID_CODE_BLOGS=${WF_COLLECTION_ID_CODE_BLOGS}
      - WF_COLLECTION_ID_POINTS_DE_RDV=${WF_COLLECTION_ID_POINTS_DE_RDV}
      - WF_COLLECTION_ID_LEXIQUES=${WF_COLLECTION_ID_LEXIQUES}
      - WF_COLLECTION_ID_PRODUCTS=${WF_COLLECTION_ID_PRODUCTS}
      - WF_COLLECTION_ID_SKUS=${WF_COLLECTION_ID_SKUS}
      - WF_COLLECTION_ID_CATEGORIES=${WF_COLLECTION_ID_CATEGORIES}

      # GoHighLevel (CRM INRI'S)
      - GHL_PIT=${GHL_PIT}
      - GHL_LOCATION_ID=${GHL_LOCATION_ID}

      # Resend (transactionnel + newsletter)
      - RESEND_API_KEY=${RESEND_API_KEY}
      - RESEND_FROM_EMAIL=${RESEND_FROM_EMAIL:-newsletter@autoecole-inris.com}
      - RESEND_AUDIENCE_ID=${RESEND_AUDIENCE_ID}

      # OneSignal (push web)
      - ONESIGNAL_APP_ID=${ONESIGNAL_APP_ID}
      - ONESIGNAL_REST_API_KEY=${ONESIGNAL_REST_API_KEY}

      # Image gen (Kie primaire, Fal fallback)
      - KIE_API_KEY=${KIE_API_KEY}
      - FAL_API_KEY=${FAL_API_KEY}

      # Apify (scraping/veille)
      - APIFY_API_TOKEN=${APIFY_API_TOKEN}

      # DataForSEO (SERP, keywords, backlinks)
      - DATAFORSEO_API_KEY=${DATAFORSEO_API_KEY}

      # Supabase (stockage / historique)
      - SUPABASE_URL=${SUPABASE_URL}
      - SUPABASE_ANON_KEY=${SUPABASE_ANON_KEY}
      - SUPABASE_SERVICE_ROLE_KEY=${SUPABASE_SERVICE_ROLE_KEY}

      # Google (GA4 + Search Console)
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET}
      - GOOGLE_API_KEY=${GOOGLE_API_KEY}
      - GOOGLE_REFRESH_TOKEN=${GOOGLE_REFRESH_TOKEN}
      - GA4_PROPERTY_ID=${GA4_PROPERTY_ID}
      - SEARCH_CONSOLE_SITE_URL=${SEARCH_CONSOLE_SITE_URL}

      # Mapbox (cartographie centres)
      - NEXT_PUBLIC_MAPBOX_TOKEN=${NEXT_PUBLIC_MAPBOX_TOKEN}

      # Sentry monitoring
      - SENTRY_DSN=${SENTRY_DSN}
      - SENTRY_AUTH_TOKEN=${SENTRY_AUTH_TOKEN}

      # Cron secret (interne, auth des jobs)
      - CRON_SECRET=${CRON_SECRET}

    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3848/admin-iris/api/auth/session"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ============================================
  # Traefik v3 — reverse proxy + Let's Encrypt
  # Co-located avec iris-dashboard pour partager le network "web"
  # ============================================
  traefik:
    image: traefik:v3.2
    container_name: traefik
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    command:
      # Provider File — bypass docker discovery (Hostinger isole les sockets)
      - "--providers.file.filename=/etc/traefik/dynamic.yml"
      - "--providers.file.watch=true"
      - "--entrypoints.web.address=:80"
      - "--entrypoints.web.http.redirections.entrypoint.to=websecure"
      - "--entrypoints.web.http.redirections.entrypoint.scheme=https"
      - "--entrypoints.web.http.redirections.entrypoint.permanent=true"
      - "--entrypoints.websecure.address=:443"
      - "--certificatesresolvers.letsencrypt.acme.email=al@crome-management.com"
      - "--certificatesresolvers.letsencrypt.acme.storage=/letsencrypt/acme.json"
      - "--certificatesresolvers.letsencrypt.acme.tlschallenge=true"
      - "--log.level=INFO"
      - "--accesslog=true"
    configs:
      - source: traefik_dynamic
        target: /etc/traefik/dynamic.yml
    volumes:
      - "traefik_letsencrypt:/letsencrypt"
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  iris-cron:
    image: ghcr.io/krome01-droid/iris-cron:latest
    pull_policy: always
    container_name: iris-cron
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      - CRON_SECRET=${CRON_SECRET}
      - IRIS_BASE_URL=http://host.docker.internal:3848/admin-iris
      - TZ=Europe/Paris
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "3"

volumes:
  traefik_letsencrypt:
    driver: local

configs:
  traefik_dynamic:
    content: |
      http:
        routers:
          iris-dashboard:
            rule: "Host(`agent.autoecole-inris.com`)"
            entryPoints:
              - websecure
            service: iris-dashboard
            tls:
              certResolver: letsencrypt
        services:
          iris-dashboard:
            loadBalancer:
              servers:
                - url: "http://host.docker.internal:3848"
              passHostHeader: true
