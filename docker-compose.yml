# ============================================
# IRIS Dashboard — Docker Compose (Hostinger VPS)
# Image pré-buildée sur GHCR via GitHub Actions
# ============================================

services:
  iris-dashboard:
    image: ghcr.io/krome01-droid/iris-dashboard:latest
    pull_policy: always
    container_name: iris-dashboard
    restart: unless-stopped
    ports:
      - "3848:3848"
    environment:
      # Runtime
      - NODE_ENV=production
      - PORT=3848
      - HOSTNAME=0.0.0.0

      # NextAuth
      - NEXTAUTH_URL=${NEXTAUTH_URL}
      - NEXTAUTH_SECRET=${NEXTAUTH_SECRET}

      # Admin local (fallback login sans WordPress)
      - ADMIN_USERNAME=${ADMIN_USERNAME}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD}

      # Anthropic
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}

      # WordPress (o2switch)
      - WP_URL=${WP_URL}
      - WP_USERNAME=${WP_USERNAME}
      - WP_APP_PASSWORD=${WP_APP_PASSWORD}

      # MySQL proxy (WP mu-plugin)
      - MYSQL_PROXY_URL=${MYSQL_PROXY_URL}
      - MYSQL_PROXY_SECRET=${MYSQL_PROXY_SECRET}

      # GoHighLevel
      - GHL_PIT=${GHL_PIT}
      - GHL_API_V1_KEY=${GHL_API_V1_KEY}
      - GHL_LOCATION_ID=${GHL_LOCATION_ID}
      - GHL_USER_ID=${GHL_USER_ID}

      # OneSignal
      - ONESIGNAL_APP_ID=${ONESIGNAL_APP_ID}
      - ONESIGNAL_REST_API_KEY=${ONESIGNAL_REST_API_KEY}

      # Kie.ai (primaire) + Fal.ai (fallback)
      - KIE_API_KEY=${KIE_API_KEY}
      - FAL_API_KEY=${FAL_API_KEY}

      # Apify
      - APIFY_API_TOKEN=${APIFY_API_TOKEN}

      # Google (GA4 + Search Console)
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET}
      - GOOGLE_API_KEY=${GOOGLE_API_KEY}
      - GOOGLE_REFRESH_TOKEN=${GOOGLE_REFRESH_TOKEN}
      - GA4_PROPERTY_ID=${GA4_PROPERTY_ID}
      - SEARCH_CONSOLE_SITE_URL=${SEARCH_CONSOLE_SITE_URL}

      # Cron
      - CRON_SECRET=${CRON_SECRET}

    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.iris-dashboard.rule=Host(`agent.autoecole-inris.com`) && PathPrefix(`/admin-iris`)"
      - "traefik.http.routers.iris-dashboard.entrypoints=websecure"
      - "traefik.http.routers.iris-dashboard.tls.certresolver=letsencrypt"
      - "traefik.http.services.iris-dashboard.loadbalancer.server.url=http://127.0.0.1:3848"

    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3848/admin-iris/api/auth/session"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  iris-cron:
    image: ghcr.io/krome01-droid/iris-cron:latest
    pull_policy: always
    container_name: iris-cron
    restart: unless-stopped
    network_mode: host
    environment:
      - CRON_SECRET=${CRON_SECRET}
      - IRIS_BASE_URL=http://127.0.0.1:3848/admin-iris
      - TZ=Europe/Paris
    depends_on:
      - iris-dashboard
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "3"
