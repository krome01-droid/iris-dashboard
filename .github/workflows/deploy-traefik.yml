# ============================================
# Traefik — One-shot deploy to Hostinger VPS
# Run manually via Actions → "Deploy Traefik" → Run workflow
# Or auto on push when deploy/traefik/** changes
# ============================================
name: Deploy Traefik

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "deploy/traefik/**"
      - ".github/workflows/deploy-traefik.yml"

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Deploy Traefik to Hostinger VPS
        uses: hostinger/deploy-on-vps@v1
        with:
          api-key: ${{ secrets.HOSTINGER_API_KEY }}
          virtual-machine: ${{ vars.HOSTINGER_VM_ID }}
          personal-token: ${{ secrets.GH_PAT }}
          project-name: traefik
          docker-compose-path: deploy/traefik/docker-compose.yml
